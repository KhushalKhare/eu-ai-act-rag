name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install lint tools
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/ --select E9,F --output-format=github

      - name: Compile check (syntax smoke test)
        run: |
          python -m py_compile src/*.py